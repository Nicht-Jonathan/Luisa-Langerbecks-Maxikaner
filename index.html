<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luisa Langerbecks Maxikaner</title>
    <style>
        /* CSS für das Design */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #121212; /* Dunkler Hintergrund */
            color: #e0e0e0; /* Helle Textfarbe */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background-color: #1f1f1f; /* Etwas hellerer Header */
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .logo {
            max-width: 200px; /* Breite des Logos anpassen */
            height: auto;
        }

        h1 {
            margin: 10px 0;
            font-size: 2.5em;
            color: #fff;
        }

        .product-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            padding: 50px 20px;
            max-width: 1200px;
        }

        .product-card {
            background-color: #1f1f1f; 
            border-radius: 10px;
            padding: 30px;
            
            /* --- HIER SIND DIE ÄNDERUNGEN --- */
            width: 100%;          /* Nimmt maximal den verfügbaren Platz ein */
            max-width: 300px;     /* Wird aber nie breiter als 300px */
            box-sizing: border-box; /* Verhindert, dass Padding die Box sprengt */
            /* -------------------------------- */
            
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            text-decoration: none; 
            color: inherit; 
            display: block; 
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* Bonus-Effekt: Wenn die Karte gehovert wird, ändert der Button seine Farbe */
        .product-card:hover .details-button {
            background-color: #af7427;
        }

        .product-image {
            max-width: 100%;
            height: 300px; 
            object-fit: contain; 
            margin-bottom: 20px;
            background-color: #333; /* Hintergrund behind image, also visual failover */

            /* --- HIER WURDE DIE ZENTRIERUNG ANGEPASST --- */
            display: block;       /* Macht das Bild zu einem Block-Element */
            margin-left: auto;    /* Zentriert es horizontal */
            margin-right: auto;
            
            /* ALTE PLATZHALTER-TEXT-REGELN ENTFERNT (display: flex, align-items, justify-content) */
            /* ------------------------------------------- */
        }

        .product-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .sold-out {
            color: #ff4d4d; 
            font-weight: bold;
            margin-bottom: 20px;
        }

        .details-button {
            display: inline-block;
            background-color: #a92822; 
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        footer {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background-color: #1f1f1f;
            margin-top: auto; 
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <img src="images/Maxikaner_Logo.png" alt="Luisa Langerbecks Maxikaner Logo" class="logo">
    <h1>Luisa Langerbecks Maxikaner</h1>
</header>

<div class="product-container">
    
    <a href="scharf.html" class="product-card">
        <img src="images/Maxikaner_Scharf.png" alt="Flasche Maxikaner Scharf" class="product-image">
        <div class="product-title">Scharf</div>
        <div class="sold-out">Aktuell ausverkauft</div>
        <span class="details-button">Mehr erfahren</span>
    </a>

    <a href="sehr-scharf.html" class="product-card">
        <img src="images/Maxikaner_Sehr_Scharf.png" alt="Flasche Maxikaner Sehr Scharf" class="product-image">
        <div class="product-title">Sehr Scharf</div>
        <div class="sold-out">Aktuell ausverkauft</div>
        <span class="details-button">Mehr erfahren</span>
    </a>

</div>

<footer>
    &copy; 2026 Luisa Langerbecks Maxikaner. Alle Rechte vorbehalten.
</footer>

</body>
</html>
